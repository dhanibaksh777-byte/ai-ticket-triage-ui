<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ticket Triage — Auto Classifier</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10151b;
    --panel: #161d25;
    --panel-raised: #1c2430;
    --border: #232b35;
    --text: #e4e9ee;
    --muted: #7c8794;
    --brand: #5aa9e6;
    --urgent: #ff5a5a;
    --high: #ff9f45;
    --medium: #ffd166;
    --low: #52d68a;
    --neg: #ff5a5a;
    --neu: #7c8794;
    --pos: #52d68a;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .wrap {
    width: 100%;
    max-width: 640px;
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--brand);
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .eyebrow::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--low);
    box-shadow: 0 0 8px var(--low);
  }

  h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 32px;
    line-height: 1.2;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }

  .sub {
    color: var(--muted);
    font-size: 15px;
    margin: 0 0 32px;
    line-height: 1.5;
  }

  .intake {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    position: relative;
  }

  .intake-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: block;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 12px;
    resize: vertical;
    min-height: 90px;
    line-height: 1.5;
  }

  textarea:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 3px rgba(90, 169, 230, 0.15);
  }

  textarea::placeholder { color: #4a5563; }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
  }

  .hint {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  button {
    background: var(--brand);
    color: #0b1620;
    border: none;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  button:hover { background: #74b9ec; }
  button:active { transform: scale(0.97); }
  button:focus-visible { outline: 2px solid var(--text); outline-offset: 2px; }

  button:disabled {
    background: var(--border);
    color: var(--muted);
    cursor: not-allowed;
  }

  .result-area {
    margin-top: 24px;
    min-height: 20px;
  }

  .ticket {
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    opacity: 0;
    transform: translateY(8px) scale(0.98);
    animation: stampIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    position: relative;
    overflow: hidden;
  }

  @media (prefers-reduced-motion: reduce) {
    .ticket { animation: none; opacity: 1; transform: none; }
  }

  @keyframes stampIn {
    0% { opacity: 0; transform: translateY(8px) scale(0.97) rotate(-1deg); }
    60% { opacity: 1; transform: translateY(-2px) scale(1.01) rotate(0.3deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  }

  .ticket-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
  }

  .ticket-id {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .stamp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1.5px solid currentColor;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tag .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .summary {
    font-size: 15px;
    line-height: 1.5;
    color: var(--text);
    border-top: 1px solid var(--border);
    padding-top: 14px;
    margin: 0;
  }

  .summary-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 6px;
  }

  .error-box {
    background: rgba(255, 90, 90, 0.08);
    border: 1px solid rgba(255, 90, 90, 0.3);
    color: #ffb3b3;
    border-radius: 8px;
    padding: 14px 16px;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
  }

  .footer-log {
    margin-top: 24px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer-log .pulse {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="eyebrow">Auto Triage — Online</div>
  <h1>Route tickets before anyone reads them.</h1>
  <p class="sub">Paste a support message. It comes back tagged with category, priority, and sentiment — ready to route to the right queue.</p>

  <div class="intake">
    <label class="intake-label" for="query">Incoming message</label>
    <textarea id="query" placeholder="e.g. My payment failed twice and I got charged both times..."></textarea>
    <div class="row">
      <span class="hint" id="hint">min 5 characters</span>
      <button id="submitBtn" onclick="classify()">Classify ticket</button>
    </div>
  </div>

  <div class="result-area" id="resultArea"></div>

  <div class="footer-log">
    <span class="pulse" id="statusPulse"></span>
    <span id="statusText">connected to /classify</span>
  </div>
</div>

<script>
  const API_URL = "https://ai-ticket-triage-api.onrender.com/classify";

  const priorityColors = {
    urgent: "#ff5a5a",
    high: "#ff9f45",
    medium: "#ffd166",
    low: "#52d68a"
  };

  const sentimentColors = {
    negative: "#ff5a5a",
    neutral: "#7c8794",
    positive: "#52d68a"
  };

  let ticketCounter = 1042;

  async function classify() {
    const input = document.getElementById("query");
    const btn = document.getElementById("submitBtn");
    const resultArea = document.getElementById("resultArea");
    const statusText = document.getElementById("statusText");
    const query = input.value.trim();

    if (query.length < 5) {
      resultArea.innerHTML = `<div class="error-box">Message too short — need at least 5 characters.</div>`;
      return;
    }

    btn.disabled = true;
    btn.textContent = "Classifying...";
    statusText.textContent = "sending request...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query })
      });

      const data = await res.json();

      if (!res.ok) {
        resultArea.innerHTML = `<div class="error-box">Error ${res.status}: ${data.detail || "Something went wrong."}</div>`;
        statusText.textContent = "request failed";
        return;
      }

      ticketCounter++;
      const pColor = priorityColors[data.priority] || "#7c8794";
      const sColor = sentimentColors[data.sentiment] || "#7c8794";

      resultArea.innerHTML = `
        <div class="ticket">
          <div class="ticket-top">
            <span class="ticket-id">TICKET #${ticketCounter}</span>
            <span class="stamp" style="color:${pColor}">${data.priority}</span>
          </div>
          <div class="tags">
            <span class="tag"><span class="dot" style="background:${sColor}"></span>${data.sentiment}</span>
            <span class="tag">${data.category}</span>
          </div>
          <span class="summary-label">Summary</span>
          <p class="summary">${data.summary}</p>
        </div>
      `;
      statusText.textContent = "connected to /classify";
    } catch (err) {
      resultArea.innerHTML = `<div class="error-box">Connection failed — is the FastAPI server running on port 8000?</div>`;
      statusText.textContent = "connection error";
    } finally {
      btn.disabled = false;
      btn.textContent = "Classify ticket";
    }
  }

  document.getElementById("query").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && e.ctrlKey) classify();
  });
</script>

</body>
</html>
